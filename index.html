<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acero Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      margin-bottom: 56px;
    }

    .hero h1 {
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #f5f5f5;
    }

    .hero p {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 400;
      color: #444;
    }

    /* ── GRID ── */
    .grid {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    /* ── CARD ── */
    .card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      cursor: pointer;
      transition: border-color 200ms ease, background 200ms ease;
    }

    .card:hover {
      background: #151515;
      border-color: #2e2e2e;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid #252525;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .card h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f5f5f5;
      line-height: 1.2;
    }

    .card p {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.6;
      color: #444;
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid #1e1e1e;
    }

    .card-status {
      font-size: 11px;
      font-weight: 500;
      color: #333;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .card-arrow {
      color: #333;
      transition: color 200ms ease, transform 200ms ease;
    }

    .card:hover .card-arrow {
      color: #f5f5f5;
      transform: translate(2px, -2px);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      body { padding: 48px 16px 60px; }
      .hero { margin-bottom: 36px; }
      .grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card, .card-arrow { transition: none; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Acero Hub</h1>
    <p>Proyectos personales</p>
  </div>

  <div class="grid" role="list">

    <a href="#" class="card" role="listitem">
      <div class="card-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      <h2>Trading Journal</h2>
      <p>Registro y análisis de operaciones. Estadísticas de rendimiento, gestión de riesgo y bitácora de decisiones.</p>
      <div class="card-footer">
        <span class="card-status">Activo</span>
        <span class="card-arrow" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 12L12 2M12 2H5M12 2v7"/>
          </svg>
        </span>
      </div>
    </a>

  </div>

</body>
</html>
